AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM base-application template Verifier Certificate Authority backend

Parameters:
  Environment:
    Description: The environment type
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - build
      - staging
      - integration
      - prod

  # API Gateway Custom Domain Parameters
  EnableCustomDomain:
    Description: Whether to create custom domains for API Gateway
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  BaseDomain:
    Description: The root domain (e.g., account.gov.uk)
    Type: String
    Default: account.gov.uk

  MockSubDomain:
    Description: The mock/test root domain (e.g., mock.verifier-ca)
    Type: String
    Default: mock

  DomainPrefix:
    Description: >
      Optional prefix to make all custom domains unique per stack (e.g., 'demo' creates
      demo-api.verifier-ca.dev..., demo-origin.api.verifier-ca.dev..., demo-mock.verifier-ca.dev...).
      Leave empty for the canonical domain names.
    Type: String
    Default: ''

  ServiceSubdomain:
    Description: The service-specific subdomain (e.g., verifier-ca)
    Type: String
    Default: verifier-ca

  ApiSubdomain:
    Description: The API-specific subdomain (e.g., api)
    Type: String
    Default: api

  OriginPrefix:
    Description: The prefix for the origin domain (e.g., origin)
    Type: String
    Default: origin

  RegionalCertificateStack:
    Description: The name of Regional ACM certificate stack
    Type: String
    Default: regional-certificates

Conditions:
  IsProduction: !Equals
    - !Ref Environment
    - prod

  CreateCustomDomain: !Equals
    - !Ref EnableCustomDomain
    - 'true'

  IsDevOrBuild: !Or
    - !Equals [!Ref Environment, dev]
    - !Equals [!Ref Environment, build]

  HasDomainPrefix: !Not [!Equals [!Ref DomainPrefix, '']]

  CreateMockDomain: !And
    - !Condition CreateCustomDomain
    - !Condition IsDevOrBuild

Resources:
  # Shared API Gateway Custom Domains
  # These are created once and shared by multiple application stacks via base path mappings
  ApiGatewayOriginDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: CreateCustomDomain
    Properties:
      DomainName: !If
        - IsProduction
        - !Sub '${OriginPrefix}.${ApiSubdomain}.${ServiceSubdomain}.${BaseDomain}'
        - !If
          - HasDomainPrefix
          - !Sub '${DomainPrefix}-${OriginPrefix}-${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
          - !Sub '${OriginPrefix}.${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
      EndpointConfiguration:
        Types:
          - REGIONAL
      RegionalCertificateArn: !ImportValue
        Fn::Sub: '${RegionalCertificateStack}-CertificateARN'
      SecurityPolicy: TLS_1_2
      Tags:
        - Key: Name
          Value: !If
            - IsProduction
            - !Sub '${OriginPrefix}.${ApiSubdomain}.${ServiceSubdomain}.${BaseDomain}'
            - !If
              - HasDomainPrefix
              - !Sub '${DomainPrefix}-${OriginPrefix}-${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
              - !Sub '${OriginPrefix}.${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
        - Key: Environment
          Value: !Ref Environment

  ApiGatewayPublicDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: CreateCustomDomain
    Properties:
      DomainName: !If
        - IsProduction
        - !Sub '${ApiSubdomain}.${ServiceSubdomain}.${BaseDomain}'
        - !If
          - HasDomainPrefix
          - !Sub '${DomainPrefix}-${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
          - !Sub '${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
      EndpointConfiguration:
        Types:
          - REGIONAL
      RegionalCertificateArn: !ImportValue
        Fn::Sub: '${RegionalCertificateStack}-CertificateARN'
      SecurityPolicy: TLS_1_2
      Tags:
        - Key: Name
          Value: !If
            - IsProduction
            - !Sub '${ApiSubdomain}.${ServiceSubdomain}.${BaseDomain}'
            - !If
              - HasDomainPrefix
              - !Sub '${DomainPrefix}-${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
              - !Sub '${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
        - Key: Environment
          Value: !Ref Environment

  ApiGatewayMockDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: CreateMockDomain
    Properties:
      DomainName: !If
        - HasDomainPrefix
        - !Sub '${DomainPrefix}-${MockSubDomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
        - !Sub '${MockSubDomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
      EndpointConfiguration:
        Types:
          - REGIONAL
      RegionalCertificateArn: !ImportValue
        Fn::Sub: '${RegionalCertificateStack}-CertificateARN'
      SecurityPolicy: TLS_1_2
      Tags:
        - Key: Name
          Value: !If
            - HasDomainPrefix
            - !Sub '${DomainPrefix}-${MockSubDomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
            - !Sub '${MockSubDomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
        - Key: Environment
          Value: !Ref Environment


Outputs:
  # Custom Domain Outputs for use by application stacks
  OriginDomainName:
    Condition: CreateCustomDomain
    Description: The origin custom domain name (for base path mappings)
    Value: !Ref ApiGatewayOriginDomain
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayOriginDomain'

  OriginDomainRegionalName:
    Condition: CreateCustomDomain
    Description: The regional domain name for Route53 alias
    Value: !GetAtt ApiGatewayOriginDomain.RegionalDomainName
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayOriginDomainRegionalName'

  OriginDomainRegionalHostedZoneId:
    Condition: CreateCustomDomain
    Description: The regional hosted zone ID for Route53 alias
    Value: !GetAtt ApiGatewayOriginDomain.RegionalHostedZoneId
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayOriginDomainRegionalHostedZoneId'

  OriginDomainFullName:
    Condition: CreateCustomDomain
    Description: The full origin domain name (includes prefix if set)
    Value: !If
      - IsProduction
      - !Sub '${OriginPrefix}.${ApiSubdomain}.${ServiceSubdomain}.${BaseDomain}'
      - !If
        - HasDomainPrefix
        - !Sub '${DomainPrefix}-${OriginPrefix}-${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
        - !Sub '${OriginPrefix}.${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
    Export:
      Name: !Sub '${AWS::StackName}-OriginDomainFullName'

  PublicDomainName:
    Condition: CreateCustomDomain
    Description: The public custom domain name (for base path mappings)
    Value: !Ref ApiGatewayPublicDomain
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayPublicDomain'

  PublicDomainFullName:
    Condition: CreateCustomDomain
    Description: The full public domain name (includes prefix if set)
    Value: !If
      - IsProduction
      - !Sub '${ApiSubdomain}.${ServiceSubdomain}.${BaseDomain}'
      - !If
        - HasDomainPrefix
        - !Sub '${DomainPrefix}-${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
        - !Sub '${ApiSubdomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
    Export:
      Name: !Sub '${AWS::StackName}-PublicDomainFullName'

  MockDomainName:
    Condition: CreateMockDomain
    Description: The mock custom domain name (for base path mappings)
    Value: !Ref ApiGatewayMockDomain
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayMockDomain'

  MockDomainRegionalName:
    Condition: CreateMockDomain
    Description: The mock regional domain name for Route53 alias
    Value: !GetAtt ApiGatewayMockDomain.RegionalDomainName
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayMockDomainRegionalName'

  MockDomainRegionalHostedZoneId:
    Condition: CreateMockDomain
    Description: The mock regional hosted zone ID for Route53 alias
    Value: !GetAtt ApiGatewayMockDomain.RegionalHostedZoneId
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayMockDomainRegionalHostedZoneId'

  MockDomainFullName:
    Condition: CreateMockDomain
    Description: The full mock domain name (includes prefix if set)
    Value: !If
      - HasDomainPrefix
      - !Sub '${DomainPrefix}-${MockSubDomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
      - !Sub '${MockSubDomain}.${ServiceSubdomain}.${Environment}.${BaseDomain}'
    Export:
      Name: !Sub '${AWS::StackName}-MockDomainFullName'