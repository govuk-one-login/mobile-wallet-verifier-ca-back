name: Validate Base Application Infrastructure

on:
  workflow_call:
    inputs:
      AWS_REGION:
        description: The AWS region
        type: string
        default: eu-west-2
      TEMPLATE_PATH:
        description: Path to the SAM template
        type: string
        default: base-application.yaml

jobs:
  validate:
    name: 'Validate SAM Template'
    runs-on: ubuntu-24.04
    env:
      SAM_CLI_TELEMETRY: 0
      TEMPLATE_PATH: ${{ inputs.TEMPLATE_PATH }}
      AWS_REGION: ${{ inputs.AWS_REGION }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}
          submodules: true

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3

      - name: SAM Validate
        run: |
          sam validate --lint --template "$TEMPLATE_PATH" --region "$AWS_REGION"

      - name: Run cfn-lint
        run: |
          pip install cfn-lint
          cfn-lint "$TEMPLATE_PATH"
