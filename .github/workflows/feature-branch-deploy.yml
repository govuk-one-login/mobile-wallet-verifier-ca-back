name: Feature Branch Deploy

on:
  workflow_dispatch:
    inputs:
      enable_monitoring:
        description: 'Enable CloudWatch monitoring on deployed stacks'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: read

defaults:
  run:
    shell: bash

jobs:
  deploy-feature-branch:
    name: Deploy Feature Branch
    runs-on: ubuntu-24.04
    env:
      SAM_CLI_TELEMETRY: 0
      AWS_REGION: eu-west-2
    steps:
      - name: Validate Branch
        if: github.ref_name == 'main'
        run: |
          echo "::error::Feature branch deploy cannot run on main"
          exit 1

      - name: Sanitize Branch Name
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-40)
          echo "STACK_IDENTIFIER=$SANITIZED" >> "$GITHUB_ENV"
          echo "Stack identifier: $SANITIZED (from branch: $BRANCH_NAME)"

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          submodules: true
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version-file: .nvmrc

      - name: Configure Authentication for Private Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "engine-strict=true" > .npmrc
          echo "@govuk-one-login:registry=https://npm.pkg.github.com/" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=$GITHUB_TOKEN" >> .npmrc

      - name: Install Dependencies
        run: npm clean-install --ignore-scripts

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@f84ec7d548307efafe33230528756de3c5841a17

      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.BASE_APP_DEV_GH_ACTIONS_ROLE_ARN }}

      - name: SAM Validate Templates
        run: |
          sam validate --lint --template base-application.yaml
          sam validate --lint --template application.yaml

      - name: Deploy Base Application Stack
        run: |
          echo "Building base-application.yaml..."
          sam build --template base-application.yaml

          echo "Deploying base application stack: ca-base-$STACK_IDENTIFIER"
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "ca-base-$STACK_IDENTIFIER" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=dev \
              EnableCustomDomain=false \
            --resolve-s3 \
            --no-fail-on-empty-changeset \
            --region "$AWS_REGION" \
            --tags \
              Environment=dev \
              ManagedBy=GitHub-Actions \
              Project=Mobile-Wallet-Verifier-CA \
              FeatureBranch=true \
              StackIdentifier="$STACK_IDENTIFIER"

      - name: Authenticate with AWS - backend role
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.BACKEND_DEV_GH_ACTIONS_ROLE_ARN }}

      - name: Deploy Application Stack
        run: |
          echo "Building application.yaml..."
          sam build --template application.yaml

          # Determine monitoring settings based on input parameter
          if [[ "${{ inputs.enable_monitoring }}" == "true" ]]; then
            echo "Monitoring ENABLED"
            MONITORING_PARAMS="EnableMonitoring=true"
          else
            echo "Monitoring DISABLED"
            MONITORING_PARAMS="EnableMonitoring=false"
          fi

          echo "Deploying application stack: ca-back-$STACK_IDENTIFIER"
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "ca-back-$STACK_IDENTIFIER" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=dev \
              BaseAppStack="ca-base-$STACK_IDENTIFIER" \
              EnableCustomDomain=false \
              EnableWafAssociation=false \
              CodeSigningConfigArn=none \
              PermissionsBoundary=none \
              $MONITORING_PARAMS \
            --resolve-s3 \          
            --no-fail-on-empty-changeset \
            --region "$AWS_REGION" \
            --tags \
              Environment=dev \
              ManagedBy=GitHub-Actions \
              Project=Mobile-Wallet-Verifier-CA \
              FeatureBranch=true \
              StackIdentifier="$STACK_IDENTIFIER"
