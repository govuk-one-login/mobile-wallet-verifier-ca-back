name: Docker Build + Push Test Image
on:
  workflow_call:
    inputs:
      WORKING_DIRECTORY:
        description: Path to working directory in repo
        required: true
        type: string
      AWS_REGION:
        description: The AWS region
        type: string
        default: eu-west-2
      IMAGE_TAG:
        description: The docker image tag
        required: true
        type: string
    secrets:
      GH_ACTIONS_ROLE_ARN:
        description: AWS Role for pushing the test image and deploying artifact to AWS
        required: true
      BACKEND_ECR_REPOSITORY:
        description: ECR repository for the test images
        required: true
      CONTAINER_SIGN_KMS_KEY:
        description: KMS key for signing the test image
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  docker-build-push:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials for build environment
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 #v6.1.0
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.5.2

      - name: Build, tag, and push test image to Amazon ECR
        env:
          COSIGN_YES: "true"
          IMAGE_TAG: latest
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          BACKEND_ECR_REPOSITORY: ${{ secrets.BACKEND_ECR_REPOSITORY }}
          CONTAINER_SIGN_KMS_KEY: ${{ secrets.CONTAINER_SIGN_KMS_KEY }}
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG
          cosign sign --key awskms:///${CONTAINER_SIGN_KMS_KEY} $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG
          
