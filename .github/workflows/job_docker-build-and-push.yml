name: Docker Build + Push Test Image
on:
  workflow_call:
    inputs:
      WORKING_DIRECTORY:
        description: Path to working directory in repo
        required: true
        type: string
      AWS_REGION:
        description: The AWS region
        type: string
        default: eu-west-2
      IMAGE_TAG:
        description: The docker image tag
        required: true
        type: string
    secrets:
      GH_ACTIONS_ROLE_ARN:
        description: AWS Role for pushing the test image and deploying artifact to AWS
        required: true
      BACKEND_ECR_REPOSITORY:
        description: ECR repository for the test images
        required: true
      CONTAINER_SIGN_KMS_KEY:
        description: KMS key for signing the test image
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  docker-build-push:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials for build environment
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 #v6.0.0
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: v2.5.2

      - name: Build, tag, and push test image to Amazon ECR
        env:
          COSIGN_YES: "true"
          IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          BACKEND_ECR_REPOSITORY: ${{ secrets.BACKEND_ECR_REPOSITORY }}
          CONTAINER_SIGN_KMS_KEY: ${{ secrets.CONTAINER_SIGN_KMS_KEY }}
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG
          cosign sign --key awskms:///${CONTAINER_SIGN_KMS_KEY} $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG
          
