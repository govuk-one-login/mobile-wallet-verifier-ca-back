openapi: 3.0.3
info:
  title: Gov Checker CA Backend – Reader Certificate API
  version: '1.0.0'
  description: |
    Issues short-lived reader certificates (valid for ~24 hours) for Verifier Apps.
    Authentication model:
    - The Verifier App generates a keypair locally.
    - The app obtains a Firebase App Check token.
    - The App Check JWT is sent in the HTTP header:
        X-Firebase-AppCheck: <JWT>
    - The CA Backend validates the Firebase App Check token by:
        * Fetching JWKS from Firebase (cached, TTL ~6h)
        * Verifying JWT signature
        * Validating iss, aud, sub, exp, and nbf claims
        * Applying replay protection using jti cache
    - If authentication succeeds, the backend validates the CSR (PKCS#10)
      and issues a short-lived reader certificate.

servers:
  - url: https://api.example.com

paths:
  /issue-reader-cert:
    post:
      summary: Issue short-lived reader certificate
      description: |
        Issues a short-lived X.509 reader certificate.
        Requirements:
        - A valid Firebase App Check JWT must be provided in the
          X-Firebase-AppCheck header.
        - The CSR must be a valid PKCS#10 request.
      operationId: issueReaderCert
      parameters:
        - name: X-Firebase-AppCheck
          in: header
          required: true
          description: Firebase App Check JWT issued for this application instance.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueReaderCertRequest'
            example:
              csrPem: |
                -----BEGIN CERTIFICATE REQUEST-----
                MIIC...
                -----END CERTIFICATE REQUEST-----
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri:
          Fn::Sub: 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${IssueReaderCertServiceFunction.Arn}:live/invocations'
        passthroughBehavior: when_no_match
      responses:
        '200':
          description: Reader certificate issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueReaderCertResponse'
        '400':
          description: Invalid request (bad CSR, malformed JSON, missing fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication failed (App Check token missing or invalid)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error (e.g., JWKS fetch failure, signing failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    IssueReaderCertRequest:
      type: object
      required:
        - csrPem
      properties:
        csrPem:
          type: string
          description: |
            PKCS#10 Certificate Signing Request in PEM encoding.
            The backend validates:
            - PKCS#10 structure
            - Signature over CertificationRequestInfo
            - Extraction of subject public key
            - Allowed key size and algorithm policy
            - Signature algorithm consistency
            - Required subject fields
    IssueReaderCertResponse:
      type: object
      required:
        - certChain
      properties:
        certChain:
          type: string
          description: |
            PEM-encoded certificate chain.
            The first certificate is the leaf reader certificate,
            followed by any intermediate CA certificates.
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.
